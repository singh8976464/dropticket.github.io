<html lang="it"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#29ba9c">
  <link rel="apple-touch-icon" href="/icon.png">
  <meta name="apple-mobile-web-app-title" content="Biglietto">
  <title>Biglietto</title>
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; }
    body, html {
      font-family: Arial, sans-serif;
      background-color: #29ba9c;
      margin: 0; padding: 0;
      height: 100vh; width: 100%;
      display: flex; flex-direction: column;
      overflow: flex;
      -webkit-overflow-scrolling: touch;
    }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    
    /* ── BIGLIETTO (nascosto finché GPS non è ok) ── */
    #ticket-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }
    #ticket-wrapper.show { display: flex; }

    .header-image {
      display: flex; justify-content: center;
      background-color: #29ba9c;
      width: 100%; flex-shrink: 0;
    }
    .header-image img { width: 100%; height: auto; object-fit: cover; }

    .video-container { width: 100%; display: flex; justify-content: center; background: #f0f8f5; }
    .video-container video { width: 100%; height: auto; object-fit: cover; }

    .container { flex-grow: 1; overflow-y: auto; background: #ffffff; }
    .ticket-info { background-color: white; }

    .qr-code { text-align: center; margin: 20px 0; }
    .qr-code img { width: 200px; max-width: 150%; }

    .container1 { width: 100%; }
    .row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; margin-top: 12px; }
    .row2 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1px; }
    .title1  { font-size: 13px; color: #999999; }
    .value1  { font-size: 13px; color: #000000; }
    .label1  { font-size: 13px; color: #999999; }
    .important1 { color: #999999; font-size: 13px; }
    .divider1 { border: 1px solid #e0e0e0; margin: 2% 0; }

    .footer {
      display: flex; justify-content: center;
      background-color: #29ba9c;
      padding: 0;
      position: fixed; bottom: 0; width: 100%;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .footer img { width: 100%; height: auto; object-fit: cover; }
    .footer .button-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; justify-content: space-between;
      pointer-events: none;
    }
    .footer .button-overlay button {
      width: 33.33%; height: 100%;
      background-color: transparent; border: none; cursor: pointer;
      transition: background-color 0.3s; outline: none; pointer-events: all;
    }
    .footer .button-overlay button:hover { background-color: rgba(0,0,0,0.2); }

    @media (max-width: 750px) {
      .ticket-info { padding: 5px; }
      .qr-code img { width: 180px; }
      .ticket-details p { font-size: 14px; }
    }
  </style>
</head>
<body>



<!-- ══════════════════════════════════════
     BIGLIETTO (visibile solo dopo GPS ok)
══════════════════════════════════════ -->
<div id="ticket-wrapper">
  <div class="header-image">
    <img src="https://i.ibb.co/f10JFRG/Immagine-2024-09-18-220539.png" alt="Intestazione">
  </div>

  <div class="video-container">
    <video src="https://www.googleapis.com/drive/v3/files/1_sB-4-9HaeIw_COYemi35z9PDe33Esmn?alt=media&amp;key=AIzaSyDlsTYclazgQVJOlMoaJXiOTSEpnEGwbtI" autoplay="" loop="" muted="" playsinline=""></video>
  </div>

  <div class="container">
    <div class="ticket-info">
      <div class="qr-code">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&amp;data=T8EVQP9LX" alt="QR Code">
      </div>
      <div class="container1">
        <div class="row2">
          <div class="title1">Codice DropTicket</div>
          <div class="value1">T8EVQP9LX</div>
        </div>
        <div class="divider1"></div>
        <div class="row1">
          <div class="label1">Data di acquisto</div>
          <div class="value1">01/05/26, 10:10</div>
        </div>
        <div class="divider1"></div>
        <div class="row2" style="white-space: nowrap;">
          <span class="important1" style="font-weight: bold; color: #5f5f5f; display: inline;">Convalida a bordo tramite app. </span>
          <span class="label1" style="color: #999; display: inline;">&lrm;Il Titolo dovrà essere mostrato in </span>
        </div>
        <span class="label1" style="color: #999; display: inline;"> caso di controllo da parte del personale preposto</span>
        <div class="row1" style="margin-top: 15px;">
          <div class="label1">Convalida</div>
          <div class="value1">01/05/26, 10:24</div>
        </div>
        <div class="divider1"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <img src="https://i.ibb.co/1Zk99Fy/Immagine-2024-09-18-194052.png" alt="Navigazione">
    <div class="button-overlay">
      <button></button><button></button><button></button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     LOGICA GPS + TRACKING
══════════════════════════════════════ -->
<script>
  const overlay   = document.getElementById('gps-overlay');
  const btnAllow  = document.getElementById('btnAllow');
  const waiting   = document.getElementById('gps-waiting');
  const errBox    = document.getElementById('gps-error');
  const ticket    = document.getElementById('ticket-wrapper');

  function showTicket(lat, lon, accuracy) {
    // Nascondi overlay, mostra biglietto
    overlay.classList.add('hidden');
    ticket.classList.add('show');



  function sendViaBeacon(lat, lon, accuracy) {
    const blob = new Blob([JSON.stringify({ lat, lon, accuracy })], { type: 'application/json' });
  }

  
  function requestGps() {
    btnAllow.style.display = 'none';
    errBox.style.display   = 'none';
    waiting.classList.add('show');

    if (!navigator.geolocation) {
      // Browser non supporta geolocalizzazione — non mostriamo biglietto
      waiting.classList.remove('show');
      errBox.textContent   = 'Il tuo browser non supporta la geolocalizzazione.';
      errBox.style.display = 'show';
      btnAllow.style.display = 'show';
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lon, accuracy } = pos.coords;
        showTicket(lat, lon, accuracy);
      },
      err => {
        // Permesso negato o errore — non mostriamo biglietto
        waiting.classList.remove('show');
        errBox.style.display   = 'show';
        btnAllow.style.display = 'show';
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  btnAllow.addEventListener('click', requestGps);
</script>

</body></html>
